<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>LAMP Contacts Manager</title>
    <link rel="stylesheet" href="css/style.css">
    <script src="js/code.js" defer></script>
</head>
<body>
    <main class="auth-container">
        <div class="Welcome">Welcome</div>
        <div class="pleaseLogin">Please login if you wish to continue</div>

        <div class="container">
        <section class="card">
            <form id="login-form">
                <label for="login-username">Username</label>
                <input type="text" id="login-username" autocomplete="username" placeholder="Username" required>

                <label for="login-password">Password</label>
                <input type="password" id="login-password" autocomplete="current-password" placeholder="Password" required>

                <button type="submit">Login</button>
            </form>

            <p id="login-status" class="status-message"></p>
        </section>

        <section class="card register-card"> 

            <form id="register-form">
                <label for="register-first-name">First Name</label>
                <input type="text" id="register-first-name" required>

                <label for="register-last-name">Last Name</label>
                <input type="text" id="register-last-name"  required>

                <label for="register-username">Username</label>
                <input type="text" id="register-username" autocomplete="username" required>

                <label for="register-password">Password</label>
                <input type="password" id="register-password" autocomplete="new-password" required>

                <button type="submit">Create Account</button>
            </form>

            <p id="register-status" class="status-message"></p>
        </section>
        </div>
        <br>
            <div class = "DontHaveAccount">
                <p>Don't have an account?</p>
            </div>

        <div class="createLink">
            <p><a href="createAccount.html" class="create">Create new account</a></p>
        </div>

    </main>
</body>
</html>
