<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Contacts Dashboard</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/contacts.css">
    <script src="js/code.js" defer></script>
</head>
<body>
    <main class="app-container">
        <header class="app-header">
            <div>
                <h1>Contacts Dashboard</h1>
                <p id="welcome-message">Signed in</p>
            </div>

            <button id="logout-button" type="button">Logout</button>
        </header>

        <section class="card">
            <h2>Search Contacts</h2>

            <form id="search-form" class="inline-form">
                <input type="text" id="search-input" placeholder="Search by name, phone, or email">
                <button type="submit">Search</button>
                <button type="button" id="show-all-button">Show All</button>
            </form>

            <p id="search-status" class="status-message"></p>
        </section>

        <section class="card">
            <h2>Contact Results</h2>

            <div class="table-wrapper">
                <table>
                    <thead>
                        <tr>
                            <th>Name</th>
                            <th>Phone</th>
                            <th>Email</th>
                            <th>Actions</th>
                        </tr>
                    </thead>
                    <tbody id="contacts-table-body">
                        <tr>
                            <td colspan="4">No contacts loaded yet.</td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </section>

        <section class="card">
            <h2 id="contact-form-title">Add Contact</h2>

            <form id="contact-form">
                <input type="hidden" id="contact-id">

                <label for="contact-first-name">First Name</label>
                <input type="text" id="contact-first-name">

                <label for="contact-last-name">Last Name</label>
                <input type="text" id="contact-last-name">

                <label for="contact-phone">Phone</label>
                <input type="text" id="contact-phone">

                <label for="contact-email">Email</label>
                <input type="email" id="contact-email">

                <div class="button-row">
                    <button type="submit" id="save-contact-button">Add Contact</button>
                    <button type="button" id="cancel-edit-button" class="secondary-button">Cancel Edit</button>
                </div>
            </form>

            <p id="contact-status" class="status-message"></p>
        </section>
    </main>
</body>
</html>
