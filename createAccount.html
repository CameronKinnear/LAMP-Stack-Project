<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Create Account</title>
    <link rel="stylesheet" href="css/createAccount.css">
    <script src="js/code.js" defer></script>
</head>
<body>

    <div class = "Create"> Create Account </div>

    <div class = "Container">
        <form id = "register-form" method = "POST">
            <label for = "register-first-name">First Name</label>
            <input type = "text" id = "register-first-name" placeholder = "Insert First Name" required>
            
            <label for = "register-last-name">Last Name</label>    
            <input type = "text" id = "register-last-name" placeholder = "Insert Last Name" required>
            
            <label for = "register-username">Username</label>
            <input type = "text" id = "register-username" placeholder = "Insert Username" required>
            
            <label for = "register-password">Password</label>
            <input type = "password" id = "register-password" placeholder = "Insert Password" required>
            <p class="pass-warning">Password must be at least 6 characters in length</p>
            
            <label for= "confirmPass">Confirm Password</label>
            <input type = "password" id = "confirmPass" class = "fullBar" placeholder = "Confirm Password" required>
            <button type="submit">Create Account</button>
            
            <a href="/index.html" class="back-to-login">Back to Login</p>
        </form>
    </div>
    <p id="register-status" class="status-message"></p>
    <div id = "registerError"></div>
</body>
</html>
